<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<section style="background:#fff;border-bottom:1px solid #e3e8e3;width:100%;position:relative;overflow:hidden">
  <div style="max-width:1180px;margin:0 auto;padding:clamp(40px,6vw,72px) 24px clamp(36px,5vw,60px)">
    <div style="display:inline-flex;align-items:center;gap:11px;margin-bottom:16px">
      <span style="width:18px;height:18px;background:#14572F;clip-path:polygon(0 0,58% 0,100% 50%,58% 100%,0 100%,42% 50%);flex:none"></span>
      <span style="font-size:13px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:#C8202A">{{ eyebrow }}</span>
    </div>
    <h1 style="font-size:clamp(36px,5.4vw,62px);font-weight:800;text-transform:uppercase;color:#14572F;max-width:16em;text-wrap:balance">{{ title }}</h1>
    <p style="font-size:18px;color:#414b44;margin-top:18px;line-height:1.7;max-width:44em">{{ lead }}</p>
  </div>
  <span style="position:absolute;right:-40px;top:-40px;width:180px;height:180px;background:#F4F6F3;clip-path:polygon(0 0,100% 0,100% 100%);opacity:.7"></span>
</section>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1180,&quot;height&quot;:260},&quot;eyebrow&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Leistungen&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Seitentitel&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;lead&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Einleitung.&quot;,&quot;tsType&quot;:&quot;string&quot;}}"></script>
</body>
</html>
