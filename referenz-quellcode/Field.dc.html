<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="width:100%">
  <label style="display:block;font-size:13px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#2b352e;margin-bottom:8px">{{ label }}</label>
  <sc-if value="{{ isArea }}" hint-placeholder-val="{{ false }}">
    <textarea value="{{ value }}" onInput="{{ onInput }}" rows="{{ rows }}" placeholder="{{ placeholder }}" style="width:100%;padding:13px 14px;border:1px solid #cdd6cd;background:#fbfcfb;font-size:15.5px;outline:none;resize:vertical;line-height:1.5" style-focus="border-color:#14572F"></textarea>
  </sc-if>
  <sc-if value="{{ notArea }}" hint-placeholder-val="{{ true }}">
    <input type="{{ type }}" value="{{ value }}" onInput="{{ onInput }}" placeholder="{{ placeholder }}" style="width:100%;padding:13px 14px;border:1px solid #cdd6cd;background:#fbfcfb;font-size:15.5px;outline:none" style-focus="border-color:#14572F"/>
  </sc-if>
  <sc-if value="{{ hasErr }}" hint-placeholder-val="{{ false }}">
    <div style="color:#C8202A;font-size:13px;margin-top:6px;font-weight:600;display:flex;align-items:center;gap:6px"><span style="width:9px;height:9px;background:#C8202A;clip-path:polygon(0 0,58% 0,100% 50%,58% 100%,0 100%,42% 50%);flex:none"></span>{{ err }}</div>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:380,&quot;height&quot;:92},&quot;label&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Label&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;err&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;value&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;onInput&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;(e:any)=&gt;void&quot;},&quot;placeholder&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;type&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;text&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;area&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;rows&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:4,&quot;tsType&quot;:&quot;number&quot;}}">
class Component extends DCLogic {
  renderVals() {
    return {
      label: this.props.label || '',
      err: this.props.err || '',
      hasErr: !!(this.props.err && String(this.props.err).length),
      value: this.props.value || '',
      onInput: this.props.onInput,
      placeholder: this.props.placeholder || '',
      type: this.props.type || 'text',
      isArea: !!this.props.area,
      notArea: !this.props.area,
      rows: this.props.rows || 4,
    };
  }
}
</script>
</body>
</html>
