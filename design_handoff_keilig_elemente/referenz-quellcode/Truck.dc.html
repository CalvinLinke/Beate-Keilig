<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@500;600&display=swap" rel="stylesheet">
<style>
  @keyframes kspin { to { transform: rotate(360deg); } }
  @keyframes kpuff { 0% { opacity:.0; transform: translate(0,0) scale(.6); } 20% { opacity:.5; } 100% { opacity:0; transform: translate(-16px,-14px) scale(1.3); } }
</style>
</helmet>
<div style="position:relative;width:260px;height:132px;font-family:'Barlow',sans-serif">

  <!-- exhaust pipe + puffs -->
  <div style="position:absolute;left:150px;top:4px;width:5px;height:12px;background:#1C201E"></div>
  <div style="position:absolute;left:140px;top:2px;width:10px;height:10px;background:#b9c4bb;border-radius:50%;animation:kpuff 1.8s ease-out infinite"></div>
  <div style="position:absolute;left:140px;top:2px;width:8px;height:8px;background:#cdd6cd;border-radius:50%;animation:kpuff 1.8s ease-out .9s infinite"></div>

  <!-- box body -->
  <div style="position:absolute;left:6px;top:14px;width:156px;height:64px;background:#14572F"></div>
  <!-- red bottom stripe on box -->
  <div style="position:absolute;left:6px;top:70px;width:156px;height:8px;background:#C8202A"></div>
  <!-- keil logo on box -->
  <div style="position:absolute;left:13px;top:23px;width:16px;height:16px;background:#fff;clip-path:polygon(0 0,58% 0,100% 50%,58% 100%,0 100%,42% 50%)"></div>
  <!-- KEILIG wordmark -->
  <div style="position:absolute;left:37px;top:18px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:27px;line-height:1;letter-spacing:.04em;color:#fff">KEILIG</div>
  <!-- slogan -->
  <sc-if value="{{ slogan }}" hint-placeholder-val="{{ true }}">
    <div style="position:absolute;left:13px;top:47px;width:144px;font-style:italic;font-weight:500;font-size:9.5px;line-height:1.15;color:rgba(255,255,255,.92)">„Haben Sie es eilig? Dann fahren Sie es mit Keilig."</div>
  </sc-if>

  <!-- cab -->
  <div style="position:absolute;left:162px;top:34px;width:62px;height:44px;background:#14572F;clip-path:polygon(0 0,62% 0,100% 42%,100% 100%,0 100%)"></div>
  <!-- window -->
  <div style="position:absolute;left:168px;top:40px;width:30px;height:15px;background:#cfe0d8;clip-path:polygon(0 0,86% 0,100% 80%,0 100%)"></div>
  <!-- cab red accent -->
  <div style="position:absolute;left:162px;top:64px;width:62px;height:6px;background:#C8202A"></div>
  <!-- headlight -->
  <div style="position:absolute;left:218px;top:66px;width:6px;height:6px;background:#ffd24a"></div>
  <!-- bumper -->
  <div style="position:absolute;left:224px;top:72px;width:6px;height:10px;background:#1C201E"></div>

  <!-- chassis -->
  <div style="position:absolute;left:8px;top:78px;width:216px;height:6px;background:#1C201E"></div>

  <!-- rear wheel -->
  <div style="position:absolute;left:36px;top:80px;width:36px;height:36px;border-radius:50%;background:#1C201E"></div>
  <div style="position:absolute;left:44px;top:88px;width:20px;height:20px;border-radius:50%;background:#39443d"></div>
  <div style="position:absolute;left:44px;top:88px;width:20px;height:20px;animation:kspin .7s linear infinite">
    <div style="position:absolute;left:9px;top:1px;width:2px;height:18px;background:#7fae90"></div>
    <div style="position:absolute;left:1px;top:9px;width:18px;height:2px;background:#7fae90"></div>
    <div style="position:absolute;left:7.5px;top:7.5px;width:5px;height:5px;border-radius:50%;background:#C8202A"></div>
  </div>

  <!-- front wheel -->
  <div style="position:absolute;left:170px;top:80px;width:36px;height:36px;border-radius:50%;background:#1C201E"></div>
  <div style="position:absolute;left:178px;top:88px;width:20px;height:20px;border-radius:50%;background:#39443d"></div>
  <div style="position:absolute;left:178px;top:88px;width:20px;height:20px;animation:kspin .7s linear infinite">
    <div style="position:absolute;left:9px;top:1px;width:2px;height:18px;background:#7fae90"></div>
    <div style="position:absolute;left:1px;top:9px;width:18px;height:2px;background:#7fae90"></div>
    <div style="position:absolute;left:7.5px;top:7.5px;width:5px;height:5px;border-radius:50%;background:#C8202A"></div>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:260,&quot;height&quot;:132},&quot;slogan&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}">
class Component extends DCLogic {
  renderVals() {
    return { slogan: this.props.slogan !== false };
  }
}
</script>
</body>
</html>
